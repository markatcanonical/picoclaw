name: picoclaw
base: core24
version: 'git'
title: PicoClaw
summary: Ultra-lightweight personal AI agent
description: |
  PicoClaw is an ultra-lightweight personal AI assistant. It operates
  efficiently on minimal hardware and supports ClawHub integrations.
website: https://picoclaw.io/
source-code: https://github.com/sipeed/picoclaw
issues: https://github.com/sipeed/picoclaw/issues
license: MIT
contact: https://github.com/sipeed
donation: https://github.com/sipeed

grade: stable
confinement: strict

apps:
  picoclaw:
    command: bin/picoclaw
    plugs:
      - network
      - network-bind
      - removable-media
    environment:
      PICOCLAW_HOME: $SNAP_USER_COMMON
  launcher:
    command: bin/picoclaw-launcher
    plugs:
      - network
      - network-bind
    environment:
      PICOCLAW_HOME: $SNAP_USER_COMMON
  tui:
    command: bin/picoclaw-launcher-tui
    plugs:
      - network
      - network-bind
    environment:
      PICOCLAW_HOME: $SNAP_USER_COMMON
      AGENT_BROWSER_EXECUTABLE_PATH: $SNAP/usr/lib/chromium-bundle/chrome-headless-shell

parts:
  chromium:
    plugin: nil
    build-snaps:
      - node/22/stable
    build-packages:
      # GnomeV
      - libglib2.0-0t64
      # X11
      - libx11-6
      - libxcomposite1
      - libxdamage1
      - libxext6
      - libxfixes3
      - libxrandr2
      - libxcb1
      - libxkbcommon0
      # NSS
      - libnss3
      - libnspr4
      # Graphics
      - libgbm1
      # GTK/ATK accessibility
      - libatk1.0-0t64
      - libatk-bridge2.0-0
      - libatspi2.0-0t64
      # Rendering
      - libcairo2
      - libpango-1.0-0
      # Audio
      - libasound2t64
      # Printing
      - libcups2t64
    override-build: |
      cd $CRAFT_PART_BUILD
      npm init -y
      npm install playwright
      npx playwright install chromium --only-shell

      # Install agent-browser locally (so we can copy it into the snap)
      npm install agent-browser
      AGENT_BIN=$(node -e "console.log(require.resolve('agent-browser/bin/agent-browser'))")
      echo "agent-browser entry: $AGENT_BIN"

      # Find chromium headless shell
      PLAYWRIGHT_DIR=/root/.cache/ms-playwright
      SHELL_DIR=$(find $PLAYWRIGHT_DIR -maxdepth 1 -name 'chromium*' -type d | head -1)

      if [ -f "$SHELL_DIR/chrome-headless-shell-linux64/chrome-headless-shell" ]; then
        CHROME_SUBDIR="chrome-headless-shell-linux64"
        CHROME_BIN="chrome-headless-shell"
      elif [ -f "$SHELL_DIR/chrome-linux/headless_shell" ]; then
        CHROME_SUBDIR="chrome-linux"
        CHROME_BIN="headless_shell"
      else
        echo "ERROR: Could not find headless shell binary"
        exit 1
      fi

      # Copy chromium bundle
      mkdir -p $CRAFT_PART_INSTALL/usr/lib/chromium-bundle
      cp -a $SHELL_DIR/* $CRAFT_PART_INSTALL/usr/lib/chromium-bundle/
      chmod +x $CRAFT_PART_INSTALL/usr/lib/chromium-bundle/$CHROME_SUBDIR/$CHROME_BIN
      ln -sf $CHROME_SUBDIR/$CHROME_BIN $CRAFT_PART_INSTALL/usr/lib/chromium-bundle/chrome-headless-shell

      # Copy agent-browser + node_modules into snap
      mkdir -p $CRAFT_PART_INSTALL/usr/lib/agent-browser
      cp -a node_modules $CRAFT_PART_INSTALL/usr/lib/agent-browser/

      # Create wrapper script that invokes via node
      mkdir -p $CRAFT_PART_INSTALL/usr/bin
      printf '#!/bin/sh\nexec node /usr/lib/agent-browser/node_modules/agent-browser/bin/agent-browser "$@"\n' > $CRAFT_PART_INSTALL/usr/bin/agent-browser
      chmod +x $CRAFT_PART_INSTALL/usr/bin/agent-browser

      echo "=== agent-browser wrapper ==="
      cat $CRAFT_PART_INSTALL/usr/bin/agent-browser
      echo "=== Result ==="
      ls -l $CRAFT_PART_INSTALL/usr/lib/chromium-bundle/chrome-headless-shell
      ls -l $CRAFT_PART_INSTALL/usr/bin/agent-browser


  chromium-deps:
    plugin: nil
    stage-packages:
      # GnomeV
      - libglib2.0-0t64
      # X11
      - libx11-6
      - libxcomposite1
      - libxdamage1
      - libxext6
      - libxfixes3
      - libxrandr2
      - libxcb1
      - libxkbcommon0
      # NSS
      - libnss3
      - libnspr4
      # Graphics
      - libgbm1
      # GTK/ATK accessibility
      - libatk1.0-0t64
      - libatk-bridge2.0-0
      - libatspi2.0-0t64
      # Rendering
      - libcairo2
      - libpango-1.0-0
      # Audio
      - libasound2t64
      # Printing
      - libcups2t64

  picoclaw:
    plugin: nil
    source: .
    build-snaps:
      - go
      - node/22/stable
    build-packages:
      - make
    override-build: |
      export GO=/snap/bin/go
      export PATH=/snap/bin:$PATH
      
      # The web frontend requires pnpm to build
      export npm_config_prefix=$CRAFT_PART_BUILD
      npm install -g pnpm
      export PATH=$CRAFT_PART_BUILD/bin:$PATH

      # The Makefile uses `go generate` which expects the workspace directory
      make build
      make build-launcher
      make build-launcher-tui
      
      # Install built binaries
      mkdir -p $CRAFT_PART_INSTALL/bin
      cp -L build/picoclaw $CRAFT_PART_INSTALL/bin/picoclaw
      cp -L build/picoclaw-launcher $CRAFT_PART_INSTALL/bin/picoclaw-launcher
      cp -L build/picoclaw-launcher-tui $CRAFT_PART_INSTALL/bin/picoclaw-launcher-tui

      # Copy node binary from build snap
      cp -L /snap/node/current/bin/node $CRAFT_PART_INSTALL/bin/node

