name: picoclaw
base: core24
version: 'git'
title: PicoClaw
summary: Ultra-lightweight personal AI agent
description: |
  PicoClaw is an ultra-lightweight personal AI assistant. It operates
  efficiently on minimal hardware and supports ClawHub integrations.
website: https://picoclaw.io/
source-code: https://github.com/sipeed/picoclaw
issues: https://github.com/sipeed/picoclaw/issues
license: MIT
contact: https://github.com/sipeed
donation: https://github.com/sipeed

grade: stable
confinement: strict

apps:
  picoclaw:
    command: bin/picoclaw
    plugs:
      - network
      - network-bind
      - removable-media
    environment:
      PICOCLAW_HOME: $SNAP_USER_COMMON
      NODE_PATH: $SNAP/node_modules

  launcher:
    command: bin/picoclaw-launcher
    plugs:
      - network
      - network-bind
    environment:
      PICOCLAW_HOME: $SNAP_USER_COMMON
      NODE_PATH: $SNAP/node_modules

  tui:
    command: bin/picoclaw-launcher-tui
    plugs:
      - network
      - network-bind
    environment:
      PICOCLAW_HOME: $SNAP_USER_COMMON
      NODE_PATH: $SNAP/node_modules

parts:
  picoclaw:
    plugin: nil
    source: .
    build-snaps:
      - go
      - node/22/stable
    build-packages:
      - make
      -libolm-dev
    stage-packages:
      -libolm3
    override-build: |
      export GO=/snap/bin/go
      export PATH=/snap/bin:$PATH
      
      # The web frontend requires pnpm to build
      export npm_config_prefix=$CRAFT_PART_BUILD
      npm install -g pnpm
      export PATH=$CRAFT_PART_BUILD/bin:$PATH

      # The Makefile uses `go generate` which expects the workspace directory
      make build
      make build-launcher
      make build-launcher-tui
      
      # Install built binaries
      mkdir -p $CRAFT_PART_INSTALL/bin
      cp -L build/picoclaw $CRAFT_PART_INSTALL/bin/picoclaw
      cp -L build/picoclaw-launcher $CRAFT_PART_INSTALL/bin/picoclaw-launcher
      cp -L build/picoclaw-launcher-tui $CRAFT_PART_INSTALL/bin/picoclaw-launcher-tui

      # Copy node binary from build snap
      cp -L /snap/node/current/bin/node $CRAFT_PART_INSTALL/bin/node

      # Place ws in the snap so picoclaw can use it
      mkdir -p $CRAFT_PART_INSTALL/lib/node_modules
      npm install --prefix $CRAFT_PART_INSTALL/lib/node_modules ws

