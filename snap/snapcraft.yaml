name: picoclaw
base: core24
version: 'git'
title: PicoClaw
summary: Ultra-lightweight personal AI agent
description: |
  PicoClaw is an ultra-lightweight personal AI assistant. It operates
  efficiently on minimal hardware and supports ClawHub integrations.
website: https://picoclaw.io/
source-code: https://github.com/sipeed/picoclaw
issues: https://github.com/sipeed/picoclaw/issues
license: MIT
contact: https://github.com/sipeed
donation: https://github.com/sipeed

grade: stable
confinement: strict

apps:
  picoclaw:
    command: bin/picoclaw
    plugs:
      - network
      - network-bind
      - removable-media
    environment:
      PICOCLAW_HOME: $SNAP_USER_COMMON
  launcher:
    command: bin/picoclaw-launcher
    plugs:
      - network
      - network-bind
    environment:
      PICOCLAW_HOME: $SNAP_USER_COMMON
  tui:
    command: bin/picoclaw-launcher-tui
    plugs:
      - network
      - network-bind
    environment:
      PICOCLAW_HOME: $SNAP_USER_COMMON
      AGENT_BROWSER_EXECUTABLE_PATH: $SNAP/usr/lib/chromium-bundle/chrome-headless-shell

parts:
  chromium:
    plugin: nil
    build-snaps:
      - node/22/stable
    override-build: |
      cd $CRAFT_PART_BUILD
      npm init -y
      npm install playwright
      npx playwright install chromium --only-shell

      SHELL_DIR=$(find /root/.cache/ms-playwright -name 'chromium_headless_shell-*' -type d | head -1)
      CHROME_BIN=$(basename $(find $SHELL_DIR -type f -name 'chrome-headless-shell' | head -1))

      if [ -z "$CHROME_BIN" ]; then
        echo "ERROR: Could not find chrome-headless-shell binary in $SHELL_DIR"
        find $SHELL_DIR -type f
        exit 1
      fi

      mkdir -p $CRAFT_PART_INSTALL/usr/lib/chromium-bundle
      cp -a $SHELL_DIR/* $CRAFT_PART_INSTALL/usr/lib/chromium-bundle/
      chmod +x $CRAFT_PART_INSTALL/usr/lib/chromium-bundle/chrome-headless-shell-linux64/$CHROME_BIN

      # Normalize the name so your Go code doesn't need to care
      ln -sf chrome-headless-shell-linux64/$CHROME_BIN $CRAFT_PART_INSTALL/usr/lib/chromium-bundle/chrome-headless-shell

  chromium-deps:
    plugin: nil
    stage-packages:
      # Gnome
      - libglib2.0-0t64
      # X11
      - libx11-6
      - libxcomposite1
      - libxdamage1
      - libxext6
      - libxfixes3
      - libxrandr2
      - libxcb1
      - libxkbcommon0
      # NSS
      - libnss3
      - libnspr4
      # Graphics
      - libgbm1
      # GTK/ATK accessibility
      - libatk1.0-0t64
      - libatk-bridge2.0-0
      - libatspi2.0-0t64
      # Rendering
      - libcairo2
      - libpango-1.0-0
      # Audio
      - libasound2t64
      # Printing
      - libcups2t64

  picoclaw:
    plugin: nil
    source: .
    build-snaps:
      - go
      - node/22/stable
    build-packages:
      - make
    override-build: |
      export GO=/snap/bin/go
      export PATH=/snap/bin:$PATH
      
      # The web frontend requires pnpm to build
      export npm_config_prefix=$CRAFT_PART_BUILD
      npm install -g pnpm
      export PATH=$CRAFT_PART_BUILD/bin:$PATH

      # The Makefile uses `go generate` which expects the workspace directory
      make build
      make build-launcher
      make build-launcher-tui
      
      # Install built binaries
      mkdir -p $CRAFT_PART_INSTALL/bin
      cp -L build/picoclaw $CRAFT_PART_INSTALL/bin/picoclaw
      cp -L build/picoclaw-launcher $CRAFT_PART_INSTALL/bin/picoclaw-launcher
      cp -L build/picoclaw-launcher-tui $CRAFT_PART_INSTALL/bin/picoclaw-launcher-tui
